<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sélecteur de Question - Dé</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Le dé au milieu de la page */
        #de {
            width: 120px;
            height: 120px;
            background-color: #ffffff;
            border: 4px solid #4a90e2;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: bold;
            color: #4a90e2;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.6s ease;
        }

        /* Animation de rotation du dé */
        .lancer {
            transform: rotate(720deg) scale(1.1);
        }

        #message {
            margin-top: 25px;
            font-size: 1.2rem;
            color: #666;
            height: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Tira los dados para elegir tu pregunta !</h1>
    
    <div id="de">1</div>
    
    <div id="message">Haga clic en el dado para hacerlo girar</div>

    <script>
        const de = document.getElementById("de");
        const message = document.getElementById("message");

        // Bloque le clic si le dé est déjà en train de tourner
        let enTrainDeTourner = false;

        de.addEventListener("click", () => {
            if (enTrainDeTourner) return; 
            enTrainDeTourner = true;

            message.innerText = "Sélection de la question...";
            de.classList.add("lancer");

            // Effet visuel : fait défiler des chiffres très vite (faux suspense)
            let compteur = 0;
            const intervalle = setInterval(() => {
                const chiffreTemporaire = Math.floor(Math.random() * 15) + 1;
                de.innerText = chiffreTemporaire;
                compteur++;
                
                if (compteur > 10) {
                    clearInterval(intervalle);
                }
            }, 50);

            // Résultat final et redirection après l'animation (700ms)
            setTimeout(() => {
                de.classList.remove("lancer");

                // Calcul du vrai chiffre final entre 1 et 20
                const numeroQuestion = Math.floor(Math.random() * 15) + 1;
                
                // Affichage du chiffre final
                de.innerText = numeroQuestion;
                message.innerText = `Direction la question ${numeroQuestion} !`;

                // Redirection vers ta page HTML après 1 seconde
                setTimeout(() => {
                    window.location.href = `../pregunta/pregunta${numeroQuestion}.html`;
                }, 1000);

            }, 700);
        });
    </script>
</body>
</html>
