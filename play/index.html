<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Andaluz - Le Jeu</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="game-ui">
    <div id="de-visuel">?</div>
    <button id="btn-lancer">LANCER LE DÉ</button>
</div>

<style>
    #game-ui {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        font-family: sans-serif;
    }
    #de-visuel {
        width: 80px;
        height: 80px;
        background-color: white;
        color: #333;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        font-weight: bold;
        box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        border: 2px solid #ccc;
        transition: transform 0.1s ease;
    }
    #btn-lancer {
        padding: 15px 30px;
        font-size: 1.2rem;
        font-weight: bold;
        color: white;
        background: linear-gradient(180deg, #ff4e50, #f9d423);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 6px 0 #d44042, 0 12px 20px rgba(0,0,0,0.4);
    }
    #btn-lancer:active {
        transform: translateY(4px);
        box-shadow: 0 2px 0 #d44042;
    }
</style>

<script>
    const btnLancer = document.getElementById('btn-lancer');
    const deVisuel = document.getElementById('de-visuel');

    btnLancer.addEventListener('click', () => {
        btnLancer.disabled = true;

        // Animation rapide du dé
        const intervalle = setInterval(() => {
            deVisuel.innerText = Math.floor(Math.random() * 6) + 1;
            deVisuel.style.transform = `rotate(${Math.random() * 20 - 10}deg) scale(1.1)`;
        }, 50);

        // Résultat final après 500ms
        setTimeout(() => {
            clearInterval(intervalle);
            
            const resultatFinal = Math.floor(Math.random() * 6) + 1;
            deVisuel.innerText = resultatFinal;
            deVisuel.style.transform = "rotate(0deg) scale(1)";
            btnLancer.disabled = false;

            // La variable 'resultatFinal' contient le chiffre (1 à 6)
            console.log("Résultat : " + resultatFinal);
            
            // Reçois ce résultat ici pour déclencher ton code Spline
        }, 500);
    });
</script>
</body>
</html>
