  <body>
    <h2 id="question">Quelle est la capitale de la France ?</h2>

<input type="text" id="reponse-utilisateur" placeholder="Votre réponse ici...">
<button id="valider-btn">Valider</button>

<script >// 1. Définir la bonne réponse (en minuscules pour faciliter la vérification)

const boutonValider = document.getElementById("valider-btn");
const champSaisie = document.getElementById("reponse-utilisateur");

boutonValider.addEventListener("click", () => {
    // Récupérer la valeur, enlever les espaces inutiles et mettre en minuscules
    const reponseTapee = champSaisie.value.trim().toLowerCase();

    // 4. Vérifier si la réponse est correcte
    if (reponseTapee === bonneReponse) {
        alert("Bonne réponse !");
    } else {
        alert("Mauvaise réponse... La réponse était Paris.");
    }
const numeroQuestion = Math.floor(Math.random() * 20) + 1;
    // 5. Redirection vers la page suivante après 1,5 seconde
    setTimeout(() => {
        window.location.href = "question2.html";
    }, 1500);
});</script>
